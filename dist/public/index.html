<!DOCTYPE html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Local Comet — Центр управления</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='6' stroke='%2318a4db' stroke-width='2' fill='none'/><circle cx='16' cy='16' r='14' stroke='%2318a4db' stroke-width='1.5' stroke-dasharray='4 4' opacity='0.3' fill='none'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="./assets/index-COAeyGZG.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-B6TO-RJm.css">
  </head>
  <body style="margin:0;background:#0b0d12;color:#e5e7eb;font-family:Inter,system-ui,sans-serif;">
    <div id="boot-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
      <div style="max-width:560px;width:100%;background:#11151c;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.35);">
        <div style="font-size:28px;font-weight:700;margin-bottom:8px;">Local Comet</div>
        <div style="font-size:14px;line-height:1.6;color:#9ca3af;">Инициализация локального интерфейса. Если этот экран не исчезает через несколько секунд, значит фронтенд не стартовал корректно.</div>
        <div style="margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#67e8f9;">localhost:5051 · boot screen active</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e){
        const root = document.getElementById('root');
        const boot = document.getElementById('boot-screen');
        if (boot) boot.style.display = 'none';
        if (root) {
          root.innerHTML = '<div style="min-height:100vh;padding:24px;background:#0b0d12;color:#ef4444;font-family:monospace"><h2>Local Comet: startup error</h2><pre style="white-space:pre-wrap">'+ String(e.message || e.error || 'Unknown error') +'</pre></div>';
        }
      });
    </script>
  </body>
</html>
